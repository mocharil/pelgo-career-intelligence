services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pelgo
      POSTGRES_PASSWORD: pelgo
      POSTGRES_DB: pelgo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pelgo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: >
      bash -c "alembic upgrade head &&
               python -m app.db.seed &&
               uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ./gemini_creds.json:/app/gemini_creds.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  worker-1:
    build: .
    command: python -m app.worker.main
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - .:/app
      - ./gemini_creds.json:/app/gemini_creds.json:ro

  worker-2:
    build: .
    command: python -m app.worker.main
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - .:/app
      - ./gemini_creds.json:/app/gemini_creds.json:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
